      card.scrollIntoView({behavior:'smooth',block:'center'});
      card.style.borderColor='var(--gold)';card.style.boxShadow='0 0 30px rgba(240,192,64,.6)';

  },200);
}

/* --- 图鉴工具函数 --- */
function getCatMon(id){return ALL_CATALOG_MONS.find(m=>m.id===id)||null}
/* 为图鉴魔弹生成图片HTML（战内魔弹用MON_IMG，图鉴专用魔弹内嵌增强SVG） */
function catMonImgHTML(mid,extraCls=''){
  const m=getCatMon(mid);if(!m)return'<span class="mimg-fb">❓</span>';
  if(MON_IMG[mid])return monImgHTML(mid,extraCls);
  // 图鉴专用魔弹 — 内嵌简化增强SVG
  const el=m.el||'none';const bg=EL_HEX[el]||'888';const lt={fire:'ff6b6b',light:'ffe066',earth:'e6b85c',dark:'c39bd3',water:'5dade2',wind:'58d68d',none:'aaa'}[el]||'aaa';
  const icon=m.el?EL_ICON[m.el]:'🎭';const uid='x'+mid.replace(/[^a-z0-9]/g,'');
  const svg='<svg xmlns="http://www.w3.org/2000/svg" width="220" height="300" viewBox="0 0 220 300">'
    +'<defs><radialGradient id="bx'+uid+'" cx="50%" cy="40%"><stop offset="0%" stop-color="#'+lt+'" stop-opacity=".45"/><stop offset="50%" stop-color="#'+bg+'" stop-opacity=".2"/><stop offset="100%" stop-color="#0a0a14"/></radialGradient>'
    +'<radialGradient id="cx'+uid+'" cx="50%" cy="50%"><stop offset="0%" stop-color="#'+lt+'" stop-opacity=".7"/><stop offset="100%" stop-color="#'+bg+'" stop-opacity="0"/></radialGradient>'
    +'<filter id="fx'+uid+'"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>'
    +'<rect width="220" height="300" rx="14" fill="#0a0a14" stroke="#'+bg+'" stroke-width="2.5"/><rect width="220" height="300" rx="14" fill="url(#bx'+uid+')"/>'
    +'<circle cx="110" cy="80" r="55" fill="none" stroke="#'+bg+'" stroke-width="1.5" opacity=".15"/><circle cx="110" cy="80" r="45" fill="none" stroke="#'+lt+'" stroke-width="1" opacity=".1" stroke-dasharray="8 5"/>'
    +'<circle cx="110" cy="80" r="42" fill="url(#cx'+uid+')" opacity=".5"/><text x="110" y="102" text-anchor="middle" font-size="56" fill="#fff" filter="url(#fx'+uid+')">'+icon+'</text>'
    +'<rect x="8" y="8" width="36" height="18" rx="9" fill="rgba(0,0,0,.6)" stroke="#'+bg+'" stroke-width="1.5"/><text x="26" y="21" text-anchor="middle" font-size="10" font-weight="900" fill="#'+lt+'">'+(m.el?EL_NAME[m.el]:'全')+'</text>'
    +'<rect x="10" y="190" width="200" height="98" rx="8" fill="rgba(0,0,0,.55)" stroke="#'+bg+'" stroke-width="1" opacity=".6"/>'
    +'<text x="110" y="222" text-anchor="middle" font-size="22" font-weight="900" fill="#'+lt+'" font-family="PingFang SC,Microsoft YaHei,sans-serif" filter="url(#fx'+uid+')">'+m.nm+'</text>'
    +'<text x="110" y="248" text-anchor="middle" font-size="13" fill="rgba(255,255,255,.6)">⚔️ ATK '+m.atk+' · '+m.stg+'</text>'
    +'<rect x="40" y="260" width="140" height="3" rx="1.5" fill="#'+bg+'" opacity=".4"/>'
    +'<text x="110" y="278" text-anchor="middle" font-size="10" fill="rgba(255,255,255,.35)">'+(m.el?EL_NAME[m.el]+'系':'全属性')+' · 图鉴</text></svg>';
  return `<span class="mimg-wrap${extraCls?' '+extraCls:''}" data-mid="${mid}">
    <img class="mimg" src="data:image/svg+xml,${encodeURIComponent(svg)}" alt="${m.nm}" onerror="this.parentElement.classList.add('mimg-err')">
    <span class="mimg-fb">${icon}</span></span>`;
}

/* --- 前往对战试用 --- */
function goBattleWithCatalog(){
  if(!curUser){tip('请先登录');goLogin();return}
  // 保存预选魔弹和卡牌
  if(catalogMonId)try{sessionStorage.setItem('mdw_pre_mon',catalogMonId)}catch(e){}
  if(catalogCardId)try{sessionStorage.setItem('mdw_pre_card',catalogCardId)}catch(e){}
  // 检查预选魔弹是否在对战数据中
  const preMon=catalogMonId?getMon(catalogMonId):null;
  if(!preMon&&catalogMonId){tip('该魔弹暂未加入对战系统，请选择对战魔弹');return}
  closeMo();goBattle();
  try{
    resetGS('pve');Q('#battle-log').innerHTML='';
    showPickModal('p1',()=>{
      try{
        const used=GS.p1.monsters.map(m=>m.id);
        const avail=MONSTERS.filter(m=>!used.includes(m.id));
        GS.p2.monsters=pickRnd(avail,3).map(m=>JSON.parse(JSON.stringify(m)));GS.p2.aIdx=0;
        GS.p2.monsters.forEach(m=>{if(m.id==='jiamianshengluo'&&!m._el){m._el=ALL_EL[rnd(ALL_EL.length)];m.el=m._el}});
        preloadTeamImgs(GS.p2);
        showCoinModal(()=>{
          renderBattle(GS);startTurn(GS,()=>{
            if(GS.over){showGameOver(GS);return}
            if(GS.subTurn==='p2'){setTimeout(()=>aiSubTurn(GS),200)}
          });
          if(GS.turn==='p2'){setTimeout(()=>{if(GS.subTurn==='p2')aiSubTurn(GS)},200)}
        });
      }catch(e){console.error('startBattle错误:',e);tip('编队失败，请重试')}
    });
    // 如果预选了魔弹，默认勾选
    if(preMon){
      setTimeout(()=>{
        if(!PICKED.includes(preMon.id)){if(PICKED.length>=3)PICKED.shift();PICKED.push(preMon.id);renderPickGrid();}
      },300);
    }
  }catch(e){console.error(e);tip('启动失败')}
}

/* 文本转义 */
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ============================================================ */

function bind(){
  // 登录页
  Q('#btn-login').addEventListener('click',doLogin)
  Q('#btn-register').addEventListener('click',()=>{if(Q('#btn-register').textContent==='确认注册')doRegister();else toggleReg(true)})
  // 大厅
  Q('#btn-pve').addEventListener('click',startPVE)
  Q('#btn-pvp').addEventListener('click',startPVP)
  Q('#btn-catalog').addEventListener('click',goCatalog)
  Q('#btn-logout').addEventListener('click',doLogout)
  // 对战页按钮
  /* [修改·交替] 跳过按钮→playerPass；必杀自动交替 */
  Q('#bt-end').addEventListener('click',()=>{if(GS.phase==='act'&&GS.subTurn==='p1'&&!GS.sideDone.has('p1')&&!GS.over){playerPass(GS);renderBattle(GS)}})
  Q('#bt-ult').addEventListener('click',()=>{if(GS.phase==='act'&&GS.subTurn==='p1'&&!GS.sideDone.has('p1')&&!GS.over){const r=useUlt(GS,'p1');if(!r.ok){tip(r.msg);return}playCardEffects(r,'p1');renderBattle(GS);if(GS.over)showGameOver(GS)}})
  /* [新增] 切换魔弹按钮——点击=自身回合操作结束 */
  /* [新增] 舍弃联动按钮——进入弃牌模式，再点卡牌完成舍弃+联动出牌 */
  Q('#bt-discard').addEventListener('click',()=>{if(GS.phase==='act'&&GS.subTurn==='p1'&&!GS.sideDone.has('p1')&&!GS.over&&!GS.discardUsed){GS.discardMode=!GS.discardMode;renderBattle(GS)}})
  Q('#bt-switch').addEventListener('click',()=>{if(GS.phase==='act'&&GS.subTurn==='p1'&&!GS.sideDone.has('p1')&&!GS.over){switchNow(GS)}})
  Q('#bt-back').addEventListener('click',()=>{if(GS.over||confirm('确定退出当前对局？'))goLobby()})
  // 目录页快捷按钮
  Q('#btn-catalog-battle').addEventListener('click',goBattleWithCatalog)
}

function init(){
  try{
    bind();goLogin();renderLobby()
    if(hasSave())tip('💾 有存档')
    console.log('✅ 魔弹王初始化完成')
  }catch(e){
    console.error('初始化失败:',e.message);
    // 兜底：确保至少显示登录页
    try{Q('#login-page').classList.add('active')}catch(e2){}
    try{Q('#login-msg').textContent='初始化出错，请刷新页面'}catch(e2){}
  }
}
init()
console.log('🎮 魔弹王 1v1 完整版就绪')
console.log('  登录/注册 → 大厅 → 单人AI / 双人PVP')
</script>
